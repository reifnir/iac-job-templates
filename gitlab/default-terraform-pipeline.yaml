# By default, this pipeline will run all jobs except apply on merge requests.
workflow:
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - before deploy
  - deploy

checkov scan:
  stage: before deploy
  image:
    name: bridgecrew/checkov:latest
    entrypoint: [""]
  variables:
    FORCE_COLOR: "1"
  script:
    - checkov
      -d "${TERRAFORM_DIR}"
      -o cli
      -o junitxml
      -o json
      --output-file-path console,checkov-report.xml,checkov-report.json
  artifacts:
    when: always
    reports:
      junit: checkov-report.xml
    paths:
      - checkov-report.json

plan:
  resource_group: terraform
  stage: before deploy
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  script:
    - terraform -chdir="${TERRAFORM_DIR}" init
    - terraform -chdir="${TERRAFORM_DIR}" plan -out=planfile
  artifacts:
    paths:
      - $TERRAFORM_DIR/planfile

apply:
  resource_group: terraform
  stage: deploy
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  script:
    - terraform -chdir="${TERRAFORM_DIR}" init
    - terraform -chdir="${TERRAFORM_DIR}" apply -auto-approve planfile
  rules:
    - if: $CI_MERGE_REQUEST_ID
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
