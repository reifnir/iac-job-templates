# By default, this pipeline will run all jobs except apply on merge requests.
workflow:
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - before deploy
  - deploy

variables:
  # By default, this value makes all terraform jobs within a project share the same resource group
  STATE_RESOURCE_GROUP: terraform

checkov scan:
  stage: before deploy
  image:
    name: bridgecrew/checkov:latest
    entrypoint: [""]
  script:
    - checkov
      --directory "${TERRAFORM_DIR}"
      --output cli
      --output junitxml
      --output-file-path console,checkov-report.xml
  artifacts:
    when: always
    reports:
      junit: checkov-report.xml

.before_terraform_action:
  script:
    - |
      echo "Setting up AWS OIDC credentials for Terraform..."
      echo "${GITLAB_OIDC_TOKEN}" > "${CI_BUILDS_DIR}/.oidc_token"
      export AWS_WEB_IDENTITY_TOKEN_FILE="${CI_BUILDS_DIR}/.oidc_token"
      export AWS_ROLE_ARN="${AUTOMATION_ROLE_ARN}"
      export AWS_ROLE_SESSION_NAME="gitlab-${CI_PROJECT_ID}-${CI_PIPELINE_ID}"
    - |
      # Uh oh, let's not default our state key
      if [ -z "${TERRAFORM_STATE_KEY}" ]; then
        echo 'TERRAFORM_STATE_KEY is required but was unset. Please set it in the project variables or in the pipeline configuration. "${CI_PROJECT_PATH}.tfstate" is fine for single-state projects.';
        exit 1;
      fi
    - |
      echo "Setting default values for TERRAFORM_DIR, TERRAFORM_STATE_REGION, and TERRAFORM_STATE_BUCKET if they are unset..."
      if [ -z "${TERRAFORM_DIR}" ]; then
        echo "TERRAFORM_DIR was unset, defaulting to './terraform'";
        export TERRAFORM_DIR="./terraform";
      fi
      if [ -z "${TERRAFORM_STATE_REGION}" ]; then
        echo "TERRAFORM_STATE_REGION was unset, defaulting to '${TERRAFORM_STATE_REGION_CURRENT}'";
        export TERRAFORM_STATE_REGION="${TERRAFORM_STATE_REGION_CURRENT}";
      fi
      if [ -z "${TERRAFORM_STATE_BUCKET}" ]; then
        echo "TERRAFORM_STATE_BUCKET was unset, defaulting to '${TERRAFORM_STATE_BUCKET_CURRENT}'";
        export TERRAFORM_STATE_BUCKET="${TERRAFORM_STATE_BUCKET_CURRENT}";
      fi
    - |
      echo "Terraform variables:"
      echo "  AWS_ROLE_ARN:           '${AWS_ROLE_ARN}'"
      echo "  AWS_ROLE_SESSION_NAME:  '${AWS_ROLE_SESSION_NAME}'"
      echo "  TERRAFORM_DIR:          '${TERRAFORM_DIR}'"
      echo "  TERRAFORM_STATE_REGION: '${TERRAFORM_STATE_REGION}'"
      echo "  TERRAFORM_STATE_BUCKET: '${TERRAFORM_STATE_BUCKET}'"
      echo "  TERRAFORM_STATE_KEY:    '${TERRAFORM_STATE_KEY}'"

      echo "Other useful variables:"
      echo "  STATE_RESOURCE_GROUP:     '$STATE_RESOURCE_GROUP'"
    - terraform -chdir="${TERRAFORM_DIR}" init 
      -backend-config="region=${TERRAFORM_STATE_REGION}"
      -backend-config="bucket=${TERRAFORM_STATE_BUCKET}"
      -backend-config="key=${TERRAFORM_STATE_KEY}"

plan:
  resource_group: $STATE_RESOURCE_GROUP
  stage: before deploy
  # The abstraction is not worth one tiny property. It's not changing any time soon.
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  variables:
    AWS_ROLE_ARN: arn:aws:iam::${AWS_ACCOUNT_ID_ROOT}:role/ReifnirAutomationReadOnly
  script:
    - !reference [.before_terraform_action, script]
    - terraform -chdir="${TERRAFORM_DIR}" plan -out=planfile
  artifacts:
    paths:
      - ./**/planfile

apply:
  resource_group: $STATE_RESOURCE_GROUP
  stage: deploy
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  image:
    name: hashicorp/terraform:latest
    entrypoint: [""]
  variables:
    AWS_ROLE_ARN: arn:aws:iam::${AWS_ACCOUNT_ID_ROOT}:role/ReifnirAutomationDeploy
  script:
    - !reference [.before_terraform_action, script]
    - terraform -chdir="${TERRAFORM_DIR}" apply -auto-approve planfile
  rules:
    # Make for less collisions in testing, but allow some flexibility for the future when the parent pipeline knows best
    # It's dumb I have to spell this out, but Gitlab blows up with "jobs:apply:rules:rule when unknown value: $apply_terraform_when"
    # if I try to use a variable directly in the when clause.
    - if: $APPLY_TERRAFORM_WHEN == "never"
      when: never
    - if: $APPLY_TERRAFORM_WHEN == "always"
      when: always
    - if: $APPLY_TERRAFORM_WHEN == "on_success"
      when: on_success
    - if: $CI_MERGE_REQUEST_ID
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
