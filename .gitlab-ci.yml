# By default, this pipeline will run all jobs except apply on merge requests.
workflow:
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - test

pass everything:
  stage: test
  variables:
    STATE_RESOURCE_GROUP: s3-pass-everything
    TERRAFORM_DIR: tests/s3-simple
    TERRAFORM_STATE_REGION: $TERRAFORM_STATE_REGION_CURRENT
    TERRAFORM_STATE_BUCKET: $TERRAFORM_STATE_BUCKET_CURRENT
    TERRAFORM_STATE_KEY: $CI_PROJECT_PATH/tests/s3-simple/pass-everything.tfstate
  trigger:
    strategy: depend
    include:
      - local: gitlab/terraform-pipeline-default.yaml

dont pass region:
  stage: test
  variables:
    STATE_RESOURCE_GROUP: s3-dont-pass-region
    TERRAFORM_DIR: tests/s3-simple
    TERRAFORM_STATE_BUCKET: $TERRAFORM_STATE_BUCKET_CURRENT
    TERRAFORM_STATE_KEY: $CI_PROJECT_PATH/tests/s3-simple/dont-pass-region.tfstate
  trigger:
    strategy: depend
    include:
      - local: gitlab/terraform-pipeline-default.yaml

dont pass bucket:
  stage: test
  variables:
    STATE_RESOURCE_GROUP: s3-dont-pass-bucket
    TERRAFORM_DIR: tests/s3-simple
    TERRAFORM_STATE_REGION: $TERRAFORM_STATE_REGION_CURRENT
    TERRAFORM_STATE_KEY: $CI_PROJECT_PATH/tests/s3-simple/dont-pass-bucket.tfstate
  trigger:
    strategy: depend
    include:
      - local: gitlab/terraform-pipeline-default.yaml

# ==================================
# Default resource group concurrency test
# Both jobs share the same state key, so if they run concurrently, one
# should fail to acquire the state lock.
# ==================================
default resource group concurrency 1:
  stage: test
  variables:
    APPLY_TERRAFORM_WHEN: never
    TERRAFORM_DIR: tests/s3-simple
    TERRAFORM_STATE_REGION: $TERRAFORM_STATE_REGION_CURRENT
    TERRAFORM_STATE_BUCKET: $TERRAFORM_STATE_BUCKET_CURRENT
    TERRAFORM_STATE_KEY: $CI_PROJECT_PATH/tests/s3-simple/default-resource-group-concurrency.tfstate
  trigger:
    strategy: depend
    include:
      - local: gitlab/terraform-pipeline-default.yaml

default resource group concurrency 2:
  stage: test
  variables:
    APPLY_TERRAFORM_WHEN: never
    TERRAFORM_DIR: tests/s3-simple
    TERRAFORM_STATE_REGION: $TERRAFORM_STATE_REGION_CURRENT
    TERRAFORM_STATE_BUCKET: $TERRAFORM_STATE_BUCKET_CURRENT
    TERRAFORM_STATE_KEY: $CI_PROJECT_PATH/tests/s3-simple/default-resource-group-concurrency.tfstate
  trigger:
    strategy: depend
    include:
      - local: gitlab/terraform-pipeline-default.yaml

# ==================================
# Tests using default terraform directory (i.e. no TERRAFORM_DIR variable set)
# ==================================
pass minimal:
  stage: test
  variables:
    TERRAFORM_STATE_KEY: $CI_PROJECT_PATH/tests/terraform/pass-minimal.tfstate
  trigger:
    strategy: depend
    include:
      - local: gitlab/terraform-pipeline-default.yaml

dont pass terraform dir:
  stage: test
  variables:
    STATE_RESOURCE_GROUP: s3-dont-pass-terraform-dir
    TERRAFORM_STATE_BUCKET: $TERRAFORM_STATE_BUCKET_CURRENT
    TERRAFORM_STATE_KEY: $CI_PROJECT_PATH/tests/terraform/dont-pass-terraform-dir.tfstate
  trigger:
    strategy: depend
    include:
      - local: gitlab/terraform-pipeline-default.yaml

# This would fail with a Gitlab "undefined job in needs block" something or other error
pass without scanning:
  stage: test
  variables:
    TERRAFORM_STATE_KEY: $CI_PROJECT_PATH/tests/terraform/pass-without-scanning.tfstate
  trigger:
    strategy: depend
    include:
      - local: gitlab/terraform-pipeline-default.yaml
