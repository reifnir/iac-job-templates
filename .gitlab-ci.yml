# By default, this pipeline will run all jobs except apply on merge requests.
workflow:
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - test

pass everything:
  stage: test
  variables:
    # Use the manually created creds until we can create and rotate them through
    # automation (which we'll need to store in terraform state)
    AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID_TEMP_ADMIN
    AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY_TEMP_ADMIN
    STATE_RESOURCE_GROUP: s3-pass-everything
    TERRAFORM_DIR: tests/s3-simple
    TERRAFORM_STATE_REGION: $TERRAFORM_STATE_REGION_CURRENT
    TERRAFORM_STATE_BUCKET: $TERRAFORM_STATE_BUCKET_CURRENT
    TERRAFORM_STATE_KEY: tests/s3-simple/s3-pass-everything.tfstate
  trigger:
    strategy: depend
    include:
      - local: gitlab/terraform-pipeline-default.yaml

